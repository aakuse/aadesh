<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>My App Hub</h1>
        <div class="menu">
            <button onclick="showApp('snake')">Snake Game</button>
            <button onclick="showApp('habits')">Habit Tracker</button>
        </div>
    </nav>

    <main id="app-container">
        <section id="snake-app">
            <h2>Snake</h2>
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <div class="controls">
                <button onclick="resetSnake()">Reset Game</button>
            </div>
        </section>

        <section id="habits-app" style="display:none;">
            <h2>Habit Tracker</h2>
            <div id="habit-list"></div>
            <button onclick="editHabits()">Edit Habits</button>
            <button onclick="resetHabits()">Reset Progress</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
